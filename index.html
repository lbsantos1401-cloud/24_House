<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>24 House | Agente Cognitivo</title>

<style>
:root{
--bg-dark:#121214;
--card:#1c1c21;
--primary:#bc13fe;
--text-light:#e9e9eb;
--text-dark:#1a1a1f;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg-dark);
height:100dvh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#app{
width:100%;
max-width:420px;
height:100%;
background:#25252b;
border-radius:0;
display:flex;
flex-direction:column;
overflow:hidden;
}

#welcomeScreen{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#1a1a1f;
}

.logo-24{font-size:120px;font-weight:800;}
.logo-house{letter-spacing:8px;color:#aaa;margin-top:-20px;}

.start-btn{
margin-top:30px;
padding:14px 40px;
border-radius:40px;
border:none;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

#chatScreen{
display:none;
flex-direction:column;
flex:1;
background:var(--card);
}

.header{
padding:14px;
background:#0e0e11;
text-align:center;
font-weight:bold;
color:var(--primary);
}

#messages{
flex:1;
padding:16px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
scroll-behavior:smooth;
}

.msg{
padding:10px 14px;
border-radius:16px;
max-width:80%;
font-size:14px;
word-wrap:break-word;
}

.bot{background:var(--text-light);color:var(--text-dark);align-self:flex-start;}
.user{background:#2a2a31;color:white;align-self:flex-end;}

#inputArea{
display:flex;
padding:10px;
background:#0e0e11;
gap:6px;
position:sticky;
bottom:0;
}

#userInput{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#25252b;
color:white;
}

.send-btn{
padding:0 16px;
border:none;
border-radius:20px;
background:var(--primary);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<div id="welcomeScreen">
<h1 class="logo-24">24</h1>
<h2 class="logo-house">HOUSE</h2>
<button class="start-btn" onclick="enterChat()">Iniciar Atendimento</button>
</div>

<div id="chatScreen">
<div class="header">24 House • Agente Inteligente</div>
<div id="messages"></div>
<div id="inputArea">
<input id="userInput" placeholder="Digite sua pergunta...">
<button class="send-btn" onclick="handleUser()">Enviar</button>
</div>
</div>

</div>

<script>
/* ================= CONFIG ================= */

const CONFIG={
whatsapp:"555186267502",
learningKey:"24house_learning"
};

/* ================= ESTADO COGNITIVO ================= */

let lastAskedClarification=false;

/* ================= LEARNING ================= */

const LearningStore={
data:JSON.parse(localStorage.getItem(CONFIG.learningKey))||{responses:{},unanswered:[]},
save(){localStorage.setItem(CONFIG.learningKey,JSON.stringify(this.data));},
reward(k,v){this.data.responses[k]=(this.data.responses[k]||0)+v;this.save();},
logUnanswered(t){this.data.unanswered.push({t,ts:Date.now()});this.save();},
getBias(k){return this.data.responses[k]||0;}
};

/* ================= BASE SEMÂNTICA ================= */

const BASE=[
{
intent:"PACOTES",
direct:true,
keywords:["preço","valor","custo","quanto","aluguel"],
responses:[
{ id:"pacote", text:"O valor do aluguel é R$799,99 para até 60 pessoas. Acima disso, é cobrado R$10 por pessoa adicional. Datas especiais têm valores diferentes." }
]
},
{
intent:"ESTRUTURA",
direct:true,
keywords:["espaço","estrutura","piscina","banheiro","som","wifi"],
responses:[
{ id:"estrutura", text:"O espaço comporta até 300 pessoas, possui piscina liberada, som ambiente, luzes, Wi-Fi e dois banheiros." }
]
},
{
intent:"AGENDA",
direct:true,
keywords:["agendar","agenda","reservar","data"],
responses:[
{ id:"agenda", text:"Para agendar uma data, é só falar com nosso atendimento no WhatsApp 😊" }
]
}
];

/* ================= DECODER ================= */

function decode(text){
text=text.toLowerCase();
let best=null;

BASE.forEach(b=>{
let score=0;
b.keywords.forEach(k=>{
if(text.includes(k)) score++;
});
if(score>0 && (!best || score>best.score)){
best={block:b,score};
}
});
return best;
}

/* ================= UI ================= */

const messages=document.getElementById("messages");
const input=document.getElementById("userInput");

function add(type,text){
const d=document.createElement("div");
d.className=`msg ${type}`;
d.innerText=text;
messages.appendChild(d);
messages.scrollTop=messages.scrollHeight;
}

function bot(t){add("bot",t);}
function user(t){add("user",t);}

/* ================= FLOW ================= */

function enterChat(){
welcomeScreen.style.display="none";
chatScreen.style.display="flex";
bot("Olá! Como posso te ajudar hoje?");
}

function handleUser(){
const text=input.value.trim();
if(!text) return;
user(text);
input.value="";
process(text);
}

function process(text){
const decoded=decode(text);

if(!decoded){
LearningStore.logUnanswered(text);
safeClarification();
return;
}

const block=decoded.block;
const response=block.responses[0];

bot(response.text);
LearningStore.reward(response.id,1);
lastAskedClarification=false;

if(block.intent==="AGENDA"){
setTimeout(()=>window.open(`https://wa.me/${CONFIG.whatsapp}`,"_blank"),1200);
}
}

function safeClarification(){
if(lastAskedClarification) return;
lastAskedClarification=true;
bot("Você quer saber sobre preço, estrutura ou agendamento?");
}

/* ================= EVENTS ================= */

input.addEventListener("keydown",e=>{
if(e.key==="Enter") handleUser();
});
</script>

</body>
</html>
