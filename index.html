<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24 House | Agente Cognitivo</title>

<style>
:root{
--bg-dark:#121214;
--card:#1c1c21;
--primary:#bc13fe;
--text-light:#e9e9eb;
--text-dark:#1a1a1f;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg-dark);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#app{
width:100%;
max-width:420px;
height:90vh;
background:#25252b;
border-radius:28px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

#welcomeScreen{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#1a1a1f;
}

.logo-24{font-size:120px;font-weight:800;}
.logo-house{letter-spacing:8px;color:#aaa;margin-top:-20px;}
.start-btn{
margin-top:30px;
padding:14px 40px;
border-radius:40px;
border:none;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

#chatScreen{
display:none;
flex-direction:column;
flex:1;
background:var(--card);
}

.header{
padding:14px;
background:#0e0e11;
text-align:center;
font-weight:bold;
color:var(--primary);
}

#messages{
flex:1;
padding:16px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px 14px;
border-radius:16px;
max-width:85%;
font-size:14px;
white-space:pre-wrap;
}

.bot{background:var(--text-light);color:var(--text-dark);align-self:flex-start;}
.user{background:#2a2a31;color:white;align-self:flex-end;}

#inputArea{
display:flex;
padding:10px;
background:#0e0e11;
gap:6px;
}

#userInput{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#25252b;
color:white;
}

.send-btn{
padding:0 16px;
border:none;
border-radius:20px;
background:var(--primary);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<div id="welcomeScreen">
<h1 class="logo-24">24</h1>
<h2 class="logo-house">HOUSE</h2>
<button class="start-btn" onclick="enterChat()">Iniciar Atendimento</button>
</div>

<div id="chatScreen">
<div class="header">24 House • Agente Inteligente</div>
<div id="messages"></div>
<div id="inputArea">
<input id="userInput" placeholder="Digite sua pergunta...">
<button class="send-btn" onclick="handleUser()">Enviar</button>
</div>
</div>

</div>

<script>
/* ===================== CONFIG ===================== */

const CONFIG = {
whatsapp:"555186267502",
learningKey:"24house_learning"
};

/* ===================== LEARNING STORE ===================== */

const LearningStore = {
data: JSON.parse(localStorage.getItem(CONFIG.learningKey)) || {
responses:{},
unanswered:[]
},

save(){
localStorage.setItem(CONFIG.learningKey,JSON.stringify(this.data));
},

reward(key,value){
this.data.responses[key]=(this.data.responses[key]||0)+value;
this.save();
},

logUnanswered(text){
this.data.unanswered.push({text,ts:Date.now()});
this.save();
},

getBias(key){
return this.data.responses[key]||0;
}
};

/* ===================== BASE SEMÂNTICA ===================== */

const BASE = [
{
intent:"PACOTES",
keywords:["preço","valor","custo","pacote","orçamento","quanto"],
responses:[
{ id:"pacotes_curto", text:"O valor é R$799,99 para até 60 pessoas. Passou disso, é R$10 por pessoa." },
{ id:"pacotes_detalhado", text:"O pacote base custa R$799,99 para até 60 pessoas. Acima disso, é cobrado R$10 por pessoa adicional. Datas especiais têm valores diferentes." }
]
},
{
intent:"ESTRUTURA",
keywords:["banheiro","piscina","som","wifi","estrutura","espaço"],
responses:[
{ id:"estrutura", text:"Nosso espaço comporta até 300 pessoas, tem piscina liberada, som ambiente, luzes, Wi-Fi e dois banheiros." }
]
},
{
intent:"AGENDA",
keywords:["agendar","agenda","reservar","data"],
responses:[
{ id:"agenda", text:"Para agendar uma data, te encaminho para nosso atendimento no WhatsApp 😊" }
]
}
];

/* ===================== DECODER ===================== */

function decode(text){
let scores=[];
BASE.forEach(block=>{
let score=0;
block.keywords.forEach(k=>{
if(text.includes(k)) score++;
});
if(score>0) scores.push({block,score});
});
scores.sort((a,b)=>b.score-a.score);
return scores[0]||null;
}

/* ===================== UI ===================== */

const messages=document.getElementById("messages");
const input=document.getElementById("userInput");

function bot(t){add("bot",t);}
function user(t){add("user",t);}

function add(type,text){
const d=document.createElement("div");
d.className=`msg ${type}`;
d.innerText=text;
messages.appendChild(d);
messages.scrollTop=messages.scrollHeight;
}

/* ===================== DEBUG ===================== */

function showDebug(){
const data = LearningStore.data;
let output = "🧠 MODO DEBUG ATIVO\n\n";

output += "📈 Respostas reforçadas:\n";
for(const k in data.responses){
output += `- ${k}: ${data.responses[k]}\n`;
}

if(Object.keys(data.responses).length===0){
output += "- (nenhuma ainda)\n";
}

output += "\n❓ Perguntas não respondidas:\n";
if(data.unanswered.length===0){
output += "- (nenhuma)\n";
}else{
data.unanswered.slice(-5).forEach(u=>{
output += `- ${u.text}\n`;
});
}

bot(output);
}

/* ===================== FLUXO ===================== */

function enterChat(){
welcomeScreen.style.display="none";
chatScreen.style.display="flex";
bot("Olá! Como posso te ajudar hoje?");
}

function handleUser(){
const raw=input.value.trim();
if(!raw)return;
user(raw);
input.value="";

if(raw.toLowerCase()==="#debug"){
showDebug();
return;
}

process(raw.toLowerCase());
}

function process(text){
const decoded=decode(text);

if(!decoded || decoded.score<2){
LearningStore.logUnanswered(text);
askClarification();
return;
}

const block=decoded.block;
let best=null;
let bestScore=-Infinity;

block.responses.forEach(r=>{
const bias=LearningStore.getBias(r.id);
if(bias>bestScore){
bestScore=bias;
best=r;
}
});

bot(best.text);
LearningStore.reward(best.id,1);

if(block.intent==="AGENDA"){
setTimeout(()=>{
window.open(`https://wa.me/${CONFIG.whatsapp}`,"_blank");
LearningStore.reward(best.id,5);
},1200);
}
}

function askClarification(){
bot("Pode me explicar melhor? É sobre valores, agenda ou estrutura?");
}

/* ===================== EVENTS ===================== */

input.addEventListener("keypress",e=>{
if(e.key==="Enter") handleUser();
});
</script>

</body>
</html>
