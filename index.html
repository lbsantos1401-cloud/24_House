<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24 House | Agente Cognitivo</title>

<style>
:root{
--bg-dark:#121214;
--card:#1c1c21;
--primary:#bc13fe;
--text-light:#e9e9eb;
--text-dark:#1a1a1f;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg-dark);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#app{
width:100%;
max-width:420px;
height:90vh;
background:#25252b;
border-radius:28px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

#welcomeScreen{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#1a1a1f;
}

.logo-24{
font-size:120px;
font-weight:800;
letter-spacing:-6px;
text-shadow:0 0 25px rgba(188,19,254,0.5);
}

.logo-house{
font-size:22px;
letter-spacing:10px;
font-weight:300;
color:#a1a1a1;
margin-top:-15px;
}

.start-btn{
margin-top:40px;
padding:14px 40px;
border-radius:40px;
border:none;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

#chatScreen{
display:none;
flex-direction:column;
flex:1;
background:var(--card);
}

.header{
padding:18px;
background:#0e0e11;
text-align:center;
font-weight:bold;
color:var(--primary);
}

#messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
padding:12px 16px;
border-radius:16px;
max-width:80%;
font-size:14px;
}

.bot{
background:var(--text-light);
color:var(--text-dark);
align-self:flex-start;
border-bottom-left-radius:4px;
}

.user{
background:#2a2a31;
color:white;
align-self:flex-end;
border-bottom-right-radius:4px;
}

#inputArea{
display:flex;
padding:10px;
background:#0e0e11;
gap:6px;
}

#userInput{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#25252b;
color:white;
}

.send-btn{
padding:0 16px;
border:none;
border-radius:20px;
background:var(--primary);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<div id="welcomeScreen">
  <h1 class="logo-24">24</h1>
  <h2 class="logo-house">HOUSE</h2>
  <button class="start-btn" onclick="enterChat()">Iniciar Atendimento</button>
</div>

<div id="chatScreen">
  <div class="header">24 House Intelligence</div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="userInput" placeholder="Digite sua mensagem...">
    <button class="send-btn" onclick="sendMessage()">Enviar</button>
  </div>
</div>

</div>

<script>
// ================= CONFIG =================
const CONFIG = {
  whatsappNumber:"555186267502",
  driveLink:"https://drive.google.com/drive/folders/1aiNziwXzKje1QoXpFKYrz-UFz1T2zz_6"
};

// ================= ESTADO COGNITIVO =================
const STATE = {
  userName: null,
  initialized: false
};

// ================= UI CORE =================
function enterChat(){
  welcomeScreen.style.display="none";
  chatScreen.style.display="flex";

  setTimeout(()=>{
    bot("Olá! Seja bem-vindo à 24 House.");
    bot("Antes de tudo, qual é o seu nome?");
  },500);
}

function bot(text){ addMessage("bot",text); }
function user(text){ addMessage("user",text); }

function addMessage(type,text){
  const div=document.createElement("div");
  div.className=`msg ${type}`;
  div.innerText=text;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

// ================= DECODER =================
function decodeIntent(text){
  const t = text.toLowerCase();

  if(!STATE.initialized){
    return "NAME";
  }

  if(t.includes("foto") || t.includes("imagem") || t.includes("galeria")){
    return "FOTOS";
  }

  if(t.includes("preço") || t.includes("valor") || t.includes("pacote")){
    return "PACOTES";
  }

  if(t.includes("agenda") || t.includes("data") || t.includes("marcar")){
    return "AGENDA";
  }

  if(t.includes("humano") || t.includes("atendente")){
    return "HUMANO";
  }

  return "UNKNOWN";
}

// ================= DECISÃO =================
function handleIntent(intent, text){
  switch(intent){

    case "NAME":
      STATE.userName = text;
      STATE.initialized = true;
      bot(`Prazer, ${STATE.userName}. Pode me dizer como posso ajudar?`);
      break;

    case "FOTOS":
      bot("Aqui está nossa galeria:");
      window.open(CONFIG.driveLink,"_blank");
      break;

    case "PACOTES":
      bot("Temos pacotes a partir de R$799. Se quiser, posso detalhar 😊");
      break;

    case "AGENDA":
      bot("Para verificar agenda, posso te encaminhar direto para um atendente.");
      redirectWhatsApp(`Olá, me chamo ${STATE.userName} e gostaria de verificar disponibilidade.`);
      break;

    case "HUMANO":
      redirectWhatsApp(`Olá, me chamo ${STATE.userName} e gostaria de falar com um atendente.`);
      break;

    default:
      bot("Não entendi totalmente 🤔 Você pode perguntar sobre fotos, valores ou agenda.");
  }
}

// ================= INPUT =================
function sendMessage(){
  const input = userInput.value.trim();
  if(!input) return;

  user(input);
  userInput.value="";

  const intent = decodeIntent(input);
  handleIntent(intent, input);
}

userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

// ================= REDIRECT =================
function redirectWhatsApp(msg){
  const url=`https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
}
</script>

</body>
</html>
