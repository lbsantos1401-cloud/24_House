<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24 House | Agente Cognitivo</title>

<style>
:root{
--bg-dark:#121214;
--card:#1c1c21;
--primary:#bc13fe;
--text-light:#e9e9eb;
--text-dark:#1a1a1f;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg-dark);
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
color:white;
}

#app{
width:100%;
max-width:420px;
height:90dvh;
background:#25252b;
border-radius:28px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

/* WELCOME */
#welcomeScreen{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#1a1a1f;
}

.logo-24{
font-size:120px;
font-weight:800;
letter-spacing:-6px;
text-shadow:0 0 25px rgba(188,19,254,0.5);
}

.logo-house{
font-size:22px;
letter-spacing:10px;
font-weight:300;
color:#a1a1a1;
margin-top:-15px;
}

.start-btn{
margin-top:40px;
padding:14px 40px;
border-radius:40px;
border:none;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

/* CHAT */
#chatScreen{
display:none;
flex-direction:column;
flex:1;
min-height:0; /* 🔑 permite scroll correto */
background:var(--card);
}

.header{
padding:18px;
background:#0e0e11;
text-align:center;
font-weight:bold;
color:var(--primary);
flex-shrink:0;
}

#messages{
flex:1;
min-height:0;              /* 🔑 essencial */
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
scroll-behavior:smooth;
}

.msg{
padding:12px 16px;
border-radius:16px;
max-width:80%;
font-size:14px;
}

.bot{
background:var(--text-light);
color:var(--text-dark);
align-self:flex-start;
border-bottom-left-radius:4px;
}

.user{
background:#2a2a31;
color:white;
align-self:flex-end;
border-bottom-right-radius:4px;
}

/* INPUT FIXO */
#inputArea{
display:flex;
padding:10px;
background:#0e0e11;
gap:6px;
position:sticky;
bottom:0;
flex-shrink:0;
}

#userInput{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#25252b;
color:white;
}

.send-btn{
padding:0 16px;
border:none;
border-radius:20px;
background:var(--primary);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<div id="welcomeScreen">
  <h1 class="logo-24">24</h1>
  <h2 class="logo-house">HOUSE</h2>
  <button class="start-btn" onclick="enterChat()">Iniciar Atendimento</button>
</div>

<div id="chatScreen">
  <div class="header">24 House Intelligence</div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="userInput" placeholder="Digite sua mensagem...">
    <button class="send-btn" onclick="sendMessage()">Enviar</button>
  </div>
</div>

</div>

<script>
// ================= CONFIG =================
const CONFIG = {
  driveLink:"https://drive.google.com/drive/folders/1aiNziwXzKje1QoXpFKYrz-UFz1T2zz_6"
};

// ================= ESTADO =================
const STATE = {
  userName: null,
  initialized: false
};

// ================= BASE SEMÂNTICA =================
const BASE_SEMANTICA = [
  {
    palavras:["preço","valor","valores","custo","pacote","quanto custa","orçamento","799","10 reais","hora extra"],
    resposta:()=>bot("O valor é R$799,99 para até 60 pessoas. Acima disso, R$10 por pessoa. Hora extra custa R$115. Datas especiais têm valores diferentes.")
  },
  {
    palavras:["pagamento","sinal","50%","entrada","desistência","cancelamento","trocar data"],
    resposta:()=>bot("A reserva é feita com sinal de 50%. Em caso de desistência, o valor não é devolvido. Troca de data apenas com 3 dias de antecedência.")
  },
  {
    palavras:["quantas pessoas","capacidade","lotação","300","60 pessoas"],
    resposta:()=>bot("O espaço comporta até 300 pessoas. O pacote base cobre até 60 convidados.")
  },
  {
    palavras:["horário","noite","dia","8 horas","21","5 da manhã"],
    resposta:()=>bot("O horário noturno é das 21h às 5h da manhã (8 horas). Eventos diurnos são a combinar.")
  },
  {
    palavras:["piscina","banheiro","wifi","churrasqueira","som","luzes","estacionamento"],
    resposta:()=>bot("O espaço possui piscina, Wi-Fi, som ambiente, luzes LED, churrasqueira, banheiros e estacionamento privado.")
  },
  {
    palavras:["regras","responsável","estragos","utensílios","prato","talheres","limpeza"],
    resposta:()=>bot("A limpeza é por nossa conta. O locador é responsável por estragos. Não fornecemos utensílios.")
  },
  {
    palavras:["onde fica","localização","endereço","alvorada"],
    resposta:()=>bot("O espaço fica localizado em Alvorada.")
  }
];

// ================= UI =================
function enterChat(){
  welcomeScreen.style.display="none";
  chatScreen.style.display="flex";
  bot("Olá! Seja bem-vindo à 24 House.");
  bot("Antes de começarmos, qual é o seu nome?");
}

function bot(text){ addMessage("bot",text); }
function user(text){ addMessage("user",text); }

function addMessage(type,text){
  const div=document.createElement("div");
  div.className=`msg ${type}`;
  div.innerText=text;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

// ================= DECODER =================
function decodeIntent(text){
  const t=text.toLowerCase();
  let melhor=null, maior=0;

  BASE_SEMANTICA.forEach(b=>{
    let score=0;
    b.palavras.forEach(p=>{ if(t.includes(p)) score++; });
    if(score>maior){ maior=score; melhor=b; }
  });

  return melhor;
}

// ================= INPUT =================
function sendMessage(){
  const input=userInput.value.trim();
  if(!input) return;

  user(input);
  userInput.value="";

  if(!STATE.initialized){
    STATE.userName=input;
    STATE.initialized=true;
    bot(`Prazer, ${STATE.userName}. Pode perguntar à vontade 😊`);
    return;
  }

  const bloco=decodeIntent(input);
  bloco ? bloco.resposta() : bot("Não entendi completamente. Pode perguntar sobre valores, horários, regras ou estrutura.");
}

userInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
