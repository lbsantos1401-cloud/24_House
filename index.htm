<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24 House | Agente Cognitivo</title>

<style>
:root{
--bg-dark:#121214;
--card:#1c1c21;
--primary:#bc13fe;
--text-light:#e9e9eb;
--text-dark:#1a1a1f;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg-dark);
display:flex;
justify-content:center;
align-items:center;
min-height:100dvh;
height:auto;
color:white;
}

#app{
width:100%;
max-width:420px;
height:100%;
max-height:100dvh;
background:#25252b;
border-radius:28px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

#welcomeScreen{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#1a1a1f;
}

.logo-24{font-size:120px;font-weight:800;}
.logo-house{letter-spacing:8px;color:#aaa;margin-top:-20px;}

.start-btn{
margin-top:30px;
padding:14px 40px;
border-radius:40px;
border:none;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

#chatScreen{
display:none;
flex-direction:column;
flex:1;
background:var(--card);
}

.header{
padding:14px;
background:#0e0e11;
text-align:center;
font-weight:bold;
color:var(--primary);
}

#messages{
flex:1;
padding:16px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
-webkit-overflow-scrolling:touch;
overscroll-behavior:contain;
}

.msg{
padding:10px 14px;
border-radius:16px;
max-width:85%;
font-size:14px;
white-space:pre-wrap;
}

.bot{background:var(--text-light);color:var(--text-dark);align-self:flex-start;}
.user{background:#2a2a31;color:white;align-self:flex-end;}

#inputArea{
display:flex;
padding:10px;
background:#0e0e11;
gap:6px;
position:sticky;
bottom:0;
}

#userInput{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#25252b;
color:white;
}

.send-btn{
padding:0 16px;
border:none;
border-radius:20px;
background:var(--primary);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<div id="welcomeScreen">
<h1 class="logo-24">24</h1>
<h2 class="logo-house">HOUSE</h2>
<button class="start-btn" onclick="enterChat()">Iniciar Atendimento</button>
</div>

<div id="chatScreen">
<div class="header">24 House • Agente Inteligente</div>
<div id="messages"></div>
<div id="inputArea">
<input id="userInput" placeholder="Digite sua pergunta...">
<button class="send-btn" onclick="handleUser()">Enviar</button>
</div>
</div>

</div>

<script>
/* ===================== CONFIG ===================== */

const CONFIG = {
  whatsapp:"555186267502",
  learningKey:"24house_learning"
};

/* ===================== NORMALIZAÇÃO ===================== */

function normalize(text){
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g,"")
    .trim();
}

/* ===================== LEARNING STORE ===================== */

const LearningStore = {
  data: JSON.parse(localStorage.getItem(CONFIG.learningKey)) || {
    responses:{},
    unanswered:[]
  },

  save(){
    localStorage.setItem(CONFIG.learningKey,JSON.stringify(this.data));
  },

  reward(key,value){
    this.data.responses[key]=(this.data.responses[key]||0)+value;
    this.save();
  },

  logUnanswered(text){
    if(!text) return;
    this.data.unanswered.push({text,ts:Date.now()});
    this.save();
  },

  getBias(key){
    return this.data.responses[key]||0;
  }
};

/* ===================== BASE SEMÂNTICA ===================== */

const BASE = [
{
  intent:"SAUDACAO",
  keywords:["ola","oi","bom dia","boa tarde","boa noite","me chamo"],
  responses:[
    { id:"saudacao", text:"Olá! Seja bem-vindo à 24 House 😊 Como posso te ajudar?" }
  ]
},
{
  intent:"PRECO",
  keywords:["preco","valor","valores","quanto","custa","aluguel","pacote"],
  responses:[
    {
      id:"preco_base",
      text:"O valor é R$799,99 para até 60 pessoas. Acima disso, é R$10 por pessoa adicional."
    }
  ]
},
{
  intent:"ESTRUTURA",
  keywords:["banheiro","piscina","som","wifi","estrutura","espaco"],
  responses:[
    {
      id:"estrutura",
      text:"Nosso espaço comporta até 300 pessoas, com piscina liberada, som ambiente, Wi-Fi e dois banheiros equipados."
    }
  ]
},
{
  intent:"AGENDA",
  keywords:["agendar","agenda","reservar","data"],
  responses:[
    {
      id:"agenda",
      text:"Para agendar uma data, nosso atendimento continua no WhatsApp 😊"
    }
  ]
}
];

/* ===================== DECODER ===================== */

function decode(text){
  let scores=[];
  BASE.forEach(block=>{
    let score=0;
    block.keywords.forEach(k=>{
      if(text.includes(k)) score++;
    });
    if(score>0) scores.push({block,score});
  });
  scores.sort((a,b)=>b.score-a.score);
  return scores[0]||null;
}

/* ===================== UI ===================== */

const messages=document.getElementById("messages");
const input=document.getElementById("userInput");

function add(type,text){
  const d=document.createElement("div");
  d.className=`msg ${type}`;
  d.innerText=text;
  messages.appendChild(d);
  messages.scrollTop=messages.scrollHeight;
}

function bot(t){ add("bot",t); }
function user(t){ add("user",t); }

/* ===================== FLUXO ===================== */

function enterChat(){
  welcomeScreen.style.display="none";
  chatScreen.style.display="flex";
  bot("Olá! Como posso te ajudar hoje?");
}

function handleUser(){
  const raw=input.value;
  if(!raw.trim()) return;

  user(raw);
  input.value="";

  if(raw.trim() === "#debug"){
    showDebug();
    return;
  }

  process(normalize(raw));
}

function process(text){
  const decoded=decode(text);

  if(!decoded){
    LearningStore.logUnanswered(text);
    askClarification();
    return;
  }

  const block=decoded.block;
  const response=block.responses[0];

  bot(response.text);
  LearningStore.reward(response.id,1);

  if(block.intent==="AGENDA"){
    setTimeout(()=>{
      window.open(`https://wa.me/${CONFIG.whatsapp}`,"_blank");
      LearningStore.reward(response.id,5);
    },1200);
  }
}

function askClarification(){
  bot("Pode me explicar melhor? Posso te ajudar com valores, agenda ou estrutura 😊");
}

/* ===================== DEBUG ===================== */

function showDebug(){
  let msg="🧠 MODO DEBUG ATIVO\n\n📈 Respostas reforçadas:\n";

  const r = LearningStore.data.responses;
  const u = LearningStore.data.unanswered;

  if(Object.keys(r).length === 0){
    msg += "- (nenhuma)\n";
  } else {
    for(const k in r){
      msg += `- ${k}: ${r[k]}\n`;
    }
  }

  msg += "\n❓ Perguntas não respondidas:\n";

  if(u.length === 0){
    msg += "- (nenhuma)\n";
  } else {
    u.forEach(item=>{
      msg += `- ${item.text}\n`;
    });
  }

  bot(msg);
}

/* ===================== EVENTS ===================== */

input.addEventListener("keypress",e=>{
  if(e.key==="Enter") handleUser();
});
</script>

</body>
</html>
